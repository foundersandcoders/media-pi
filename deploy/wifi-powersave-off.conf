# NetworkManager drop-in: disable Wi-Fi power management so the idle radio never
# parks and drops the long-lived tailnet link (the root cause of the port-22 drops).
# Install: sudo cp deploy/wifi-powersave-off.conf /etc/NetworkManager/conf.d/
# Apply:   sudo systemctl reload NetworkManager   (then re-connect wlan0 once)
# Verify:  iw dev wlan0 get power_save   -> "Power save: off"
#
# wifi.powersave values: 0 = use default, 1 = leave unchanged, 2 = disable, 3 = enable
[connection]
wifi.powersave = 2
